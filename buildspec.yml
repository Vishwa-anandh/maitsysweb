version: 0.2

env:
  variables:
    NODE_ENV: "development"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."

      # Install Google Chrome so the custom Puppeteer prerenderer has a browser
      # (Amazon Linux 2023). Installing the RPM directly via dnf lets it resolve
      # and pull all shared-library deps (nss, atk, gbm, etc.) in one step.
      - echo "Installing Google Chrome..."
      - dnf install -y https://dl.google.com/linux/direct/google-chrome-stable_current_x86_64.rpm || echo "WARN Chrome install failed"
      - (google-chrome-stable --version || google-chrome --version || echo "no chrome on PATH")

      # Install node dependencies
      - npm install

  build:
    commands:
      - echo "Building app..."

      # Show environment variable from CodeBuild
      - echo "SITE URL = $VITE_SITE_URL"

      # Optional TypeScript validation
      - npx tsc --noEmit --skipLibCheck 2>/dev/null || true

      # Build Vite project
      - npx vite build

      # Prerender every route with the custom Puppeteer script using system Chrome.
      # REQUIRED for SEO/AI crawlers - without this the deploy is an empty SPA shell.
      - export PUPPETEER_EXECUTABLE_PATH=$(command -v google-chrome-stable || command -v google-chrome || true)
      - echo "Prerendering with chrome=${PUPPETEER_EXECUTABLE_PATH:-<none>}"
      # Diagnostic mode: one page at a time (low memory), fully non-fatal so the
      # build always deploys build-info.txt + prerender-report.txt. Revert once green.
      - export PRERENDER_CONCURRENCY=1
      - node scripts/prerender.mjs || echo "WARN prerender exited non-zero"
      - echo "=== prerender-report.txt ===" && cat dist/prerender-report.txt || true

      # Self-diagnostic: write a report readable from the deployed site so we can
      # confirm the commit and how many pages were actually prerendered.
      - 'echo "commit=${CODEBUILD_RESOLVED_SOURCE_VERSION:-unknown}" > dist/build-info.txt'
      - 'echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/build-info.txt'
      - 'echo "prerendered_index_html=$(find dist -name index.html | wc -l)" >> dist/build-info.txt'
      - 'echo "sample_routes:" >> dist/build-info.txt'
      - 'find dist -name index.html | head -20 >> dist/build-info.txt'
      - cat dist/build-info.txt

      # Guard (temporarily non-fatal for diagnostics; re-enable once green)
      - test -f dist/blog/sap-s4hana-migration/index.html && echo "OK per-route file present" || echo "WARN per-route file MISSING"

      # Debug: list generated top-level pages
      - echo "Generated files:"
      - ls dist

      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "Build stage finished on $(date)"

artifacts:
  files:
    - dist/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no

cache:
  paths:
    - node_modules/**/*
