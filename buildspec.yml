version: 0.2

env:
  variables:
    NODE_ENV: "development"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."

      # Install Google Chrome so the custom Puppeteer prerenderer has a browser
      # (Amazon Linux 2023 compatible). puppeteer-core ships no bundled Chromium.
      - echo "Installing Google Chrome..."
      - dnf install -y wget
      - wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_x86_64.rpm
      - dnf install -y ./google-chrome-stable_current_x86_64.rpm

      # Install node dependencies
      - npm install

  build:
    commands:
      - echo "Building app..."

      # Show environment variable from CodeBuild
      - echo "SITE URL = $VITE_SITE_URL"

      # Optional TypeScript validation
      - npx tsc --noEmit --skipLibCheck 2>/dev/null || true

      # Build Vite project
      - npx vite build

      # Prerender every route with the custom Puppeteer script using system Chrome.
      # REQUIRED for SEO/AI crawlers - without this the deploy is an empty SPA shell.
      - export PUPPETEER_EXECUTABLE_PATH=$(command -v google-chrome-stable || command -v google-chrome)
      - test -n "$PUPPETEER_EXECUTABLE_PATH" || { echo "ERROR - Chrome not found, prerender cannot run"; exit 1; }
      - echo "Prerendering with $PUPPETEER_EXECUTABLE_PATH"
      - node scripts/prerender.mjs

      # Guard: fail the build if prerendered content is missing (prevents silent SPA-only deploys)
      - test -f dist/blog/sap-s4hana-migration/index.html
      - grep -q "application/ld+json" dist/blog/sap-s4hana-migration/index.html
      - grep -q "Key Takeaways" dist/blog/sap-s4hana-migration/index.html
      - echo "Prerender verified - static HTML with content and structured data present"

      # Debug: list generated top-level pages
      - echo "Generated files:"
      - ls dist

      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "Build stage finished on $(date)"

artifacts:
  files:
    - dist/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no

cache:
  paths:
    - node_modules/**/*
